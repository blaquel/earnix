<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Earnix</title>

<title>Earnix Admin - Users</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:#fff;
padding:20px;
padding-bottom:90px;
}

/* Header */

header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:25px;
}

.headerLeft{
display:flex;
align-items:center;
gap:15px;
}

.backBtn{
width:45px;
height:45px;
border-radius:50%;
background:#111;
display:flex;
justify-content:center;
align-items:center;
text-decoration:none;
color:#00ff88;
border:1px solid #222;
font-size:18px;
}

header h2{
font-size:24px;
}

header p{
font-size:13px;
color:#888;
margin-top:3px;
}

/* Search */

.searchBox{
margin-bottom:20px;
}

.searchBox input{
width:100%;
padding:15px;
background:#111;
border:1px solid #222;
border-radius:14px;
color:#fff;
font-size:15px;
outline:none;
}

/* User Card */

.userCard{
background:#111;
border:1px solid #222;
border-radius:18px;
padding:18px;
margin-bottom:18px;
}

.userCard h3{
color:#00ff88;
margin-bottom:15px;
font-size:20px;
}

.infoRow{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-size:14px;
}

.infoRow span:first-child{
color:#888;
}

.status{
display:inline-block;
margin-top:15px;
padding:8px 14px;
border-radius:10px;
font-size:13px;
font-weight:600;
}

.activeStatus{
background:#00ff88;
color:#000;
}

.inactiveStatus{
background:#ff3b30;
color:#fff;
}

/* Bottom Navigation */

.bottomNav{
position:fixed;
left:0;
bottom:0;
width:100%;
height:70px;
background:#111;
border-top:1px solid #222;
display:flex;
justify-content:space-around;
align-items:center;
}

.bottomNav a{
text-decoration:none;
color:#888;
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
gap:4px;
}

.bottomNav a i{
font-size:20px;
}

.bottomNav .active{
color:#00ff88;
}

/* Loader */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.9);
backdrop-filter:blur(4px);
z-index:9999;
}

.loaderBox{
width:270px;
background:#111;
padding:30px;
border-radius:18px;
text-align:center;
border:1px solid rgba(0,255,136,.2);
}

.spinner{
width:55px;
height:55px;
margin:auto;
border-radius:50%;
border:5px solid #222;
border-top:5px solid #00ff88;
animation:spin .8s linear infinite;
margin-bottom:20px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.loaderBox h3{
color:#00ff88;
margin-bottom:8px;
}

.loaderBox p{
color:#888;
font-size:14px;
}

</style>

</head>

<body>

<header>

<div class="headerLeft">

<a href="admin.html" class="backBtn">

<i class="fa-solid fa-arrow-left"></i>

</a>

<div>

<h2>Users</h2>

<p>Manage registered users</p>

</div>

</div>

</header>

<div class="searchBox">

<input
type="text"
id="searchInput"
placeholder="Search by name, username or email...">

</div>

<div id="usersContainer">

<!-- Firebase loads users here -->

</div>

<nav class="bottomNav">

<a href="admin.html">
<i class="fa-solid fa-house"></i>
<span>Home</span>
</a>

<a href="admin-users.html">
<i class="fa-solid fa-users"></i>
<span>Users</span>
</a>

<a href="admin-activate.html" class="active">
<i class="fa-solid fa-circle-check"></i>
<span>Activate</span>
</a>

<a href="admin-withdrawals.html">
<i class="fa-solid fa-money-bill-wave"></i>
<span>Withdraw</span>
</a>

<a href="admin-settings.html">
<i class="fa-solid fa-gear"></i>
<span>Settings</span>
</a>

</nav>

<div id="loader">

<div class="loaderBox">

<div class="spinner"></div>

<h3>Loading Users...</h3>

<p>Please wait.</p>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyChi8M-iJaXsqOOFrwqD25aJJQoCMdaVVU",

authDomain:"earnix-c7507.firebaseapp.com",

projectId:"earnix-c7507",

storageBucket:"earnix-c7507.firebasestorage.app",

messagingSenderId:"930659607352",

appId:"1:930659607352:web:4d1c3bce0cfd39d4e417cd"

};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const loader=document.getElementById("loader");

const usersContainer=document.getElementById("usersContainer");

const searchInput=document.getElementById("searchInput");

let users=[];

window.addEventListener("load",loadUsers);

async function loadUsers(){

loader.style.display="flex";

try{

const snapshot=await getDocs(collection(db,"users"));

users=[];

snapshot.forEach(doc=>{

users.push({

id:doc.id,

...doc.data()

});

});

displayUsers(users);

loader.style.display="none";

}catch(error){

loader.style.display="none";

alert(error.message);

}

}

function displayUsers(list){

usersContainer.innerHTML="";

if(list.length===0){

usersContainer.innerHTML="<p style='text-align:center;color:#888;'>No users found.</p>";

return;

}

list.forEach(user=>{

usersContainer.innerHTML+=`

<div class="userCard">

<h3>${user.fullname||"No Name"}</h3>

<div class="infoRow">

<span>Username</span>

<span>${user.username||"-"}</span>

</div>

<div class="infoRow">

<span>Email</span>

<span>${user.email||"-"}</span>

</div>

<div class="infoRow">

<span>Balance</span>

<span>₦${Number(user.balance||0).toLocaleString()}</span>

</div>

<div class="infoRow">

<span>Referrals</span>

<span>${user.referrals||0}</span>

</div>

<div class="infoRow">

<span>Referral Bonus</span>

<span>₦${Number(user.referralBonus||0).toLocaleString()}</span>

</div>

<div class="infoRow">

<span>Status</span>

<span>

${user.activated?

'<span class="status activeStatus">Activated</span>':

'<span class="status inactiveStatus">Not Activated</span>'}

</span>

</div>

</div>

`;

});

}

searchInput.addEventListener("input",()=>{

const keyword=searchInput.value.toLowerCase();

const filtered=users.filter(user=>{

return(

(user.fullname||"").toLowerCase().includes(keyword)||

(user.username||"").toLowerCase().includes(keyword)||

(user.email||"").toLowerCase().includes(keyword)

);

});

displayUsers(filtered);

});

</script>

</body>

</html>
