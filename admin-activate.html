<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Earnix</title>

<title>Earnix Admin - Activations</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:#fff;
padding:20px;
padding-bottom:90px;
}

/* Header */

header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:25px;
}

.headerLeft{
display:flex;
align-items:center;
gap:15px;
}

.backBtn{
width:45px;
height:45px;
background:#111;
border:1px solid #222;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
text-decoration:none;
color:#00ff88;
font-size:18px;
}

header h2{
font-size:24px;
font-weight:700;
}

header p{
font-size:13px;
color:#888;
margin-top:4px;
}

/* Search */

.searchBox{
margin-bottom:20px;
}

.searchBox input{
width:100%;
padding:15px;
background:#111;
border:1px solid #222;
border-radius:14px;
color:#fff;
outline:none;
font-size:15px;
}

/* Request Card */

.requestCard{
background:#111;
border:1px solid #222;
border-radius:18px;
padding:20px;
margin-bottom:18px;
}

.requestCard h3{
color:#00ff88;
margin-bottom:15px;
font-size:20px;
}

.infoRow{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-size:14px;
gap:10px;
}

.infoRow span:first-child{
color:#888;
}

.actions{
display:flex;
gap:12px;
margin-top:20px;
}

.actions button{
flex:1;
height:48px;
border:none;
border-radius:12px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.approveBtn{
background:#00ff88;
color:#000;
}

.rejectBtn{
background:#ff3b30;
color:#fff;
}

.actions button:hover{
opacity:.9;
}

/* Empty State */

#emptyState{
display:none;
text-align:center;
margin-top:80px;
color:#777;
}

#emptyState i{
font-size:70px;
margin-bottom:20px;
color:#333;
}

/* Bottom Navigation */

.bottomNav{
position:fixed;
left:0;
bottom:0;
width:100%;
height:70px;
background:#111;
border-top:1px solid #222;
display:flex;
justify-content:space-around;
align-items:center;
z-index:999;
}

.bottomNav a{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-decoration:none;
color:#888;
font-size:12px;
gap:4px;
height:100%;
}

.bottomNav a i{
font-size:21px;
}

.bottomNav .active{
color:#00ff88;
}

/* Loader */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.92);
backdrop-filter:blur(5px);
z-index:9999;
}

.loaderBox{
width:280px;
background:#111;
padding:30px;
border-radius:20px;
text-align:center;
border:1px solid rgba(0,255,136,.2);
}

.spinner{
width:60px;
height:60px;
margin:auto;
border-radius:50%;
border:5px solid #222;
border-top:5px solid #00ff88;
animation:spin .8s linear infinite;
margin-bottom:20px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.loaderBox h3{
margin-bottom:10px;
color:#00ff88;
}

.loaderBox p{
color:#888;
font-size:14px;
}

</style>

</head>

<body>

<header>

<div class="headerLeft">

<a href="admin.html" class="backBtn">

<i class="fa-solid fa-arrow-left"></i>

</a>

<div>

<h2>Activation Requests</h2>

<p>Approve or reject user activations</p>

</div>

</div>

</header>

<div class="searchBox">

<input
type="text"
id="searchInput"
placeholder="Search by name, username or email...">

</div>

<div id="requestsContainer">

<!-- Firebase loads activation requests here -->

</div>

<div id="emptyState">

<i class="fa-solid fa-circle-check"></i>

<h3>No Pending Requests</h3>

<p>You're all caught up.</p>

</div>

<nav class="bottomNav">

<a href="admin.html">

<i class="fa-solid fa-house"></i>

<span>Home</span>

</a>

<a href="admin-users.html">

<i class="fa-solid fa-users"></i>

<span>Users</span>

</a>

<a href="admin-activate.html" class="active">

<i class="fa-solid fa-circle-check"></i>

<span>Activate</span>

</a>

<a href="admin-withdrawals.html">

<i class="fa-solid fa-money-bill-wave"></i>

<span>Withdraw</span>

</a>

<a href="admin-settings.html">

<i class="fa-solid fa-gear"></i>

<span>Settings</span>

</a>

</nav>

<div id="loader">

<div class="loaderBox">

<div class="spinner"></div>

<h3>Loading Requests...</h3>

<p>Please wait.</p>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
getDocs,
doc,
updateDoc,
getDoc,
increment,
addDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyChi8M-iJaXsqOOFrwqD25aJJQoCMdaVVU",

authDomain:"earnix-c7507.firebaseapp.com",

projectId:"earnix-c7507",

storageBucket:"earnix-c7507.firebasestorage.app",

messagingSenderId:"930659607352",

appId:"1:930659607352:web:4d1c3bce0cfd39d4e417cd"

};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

/* Fixed Referral Reward */

const referralReward = 400;

const loader=document.getElementById("loader");

const requestsContainer=document.getElementById("requestsContainer");

const emptyState=document.getElementById("emptyState");

const searchInput=document.getElementById("searchInput");

let requests=[];

window.addEventListener("load",loadRequests);

async function loadRequests(){

loader.style.display="flex";

try{

const q=query(

collection(db,"activation_requests"),

where("status","==","pending")

);

const snapshot=await getDocs(q);

requests=[];

snapshot.forEach(docSnap=>{

requests.push({

id:docSnap.id,

...docSnap.data()

});

});

displayRequests(requests);

loader.style.display="none";

}catch(error){

loader.style.display="none";

alert(error.message);

}

}

function displayRequests(list){

requestsContainer.innerHTML="";

if(list.length===0){

emptyState.style.display="block";

return;

}

emptyState.style.display="none";

list.forEach(request=>{

requestsContainer.innerHTML+=`

<div class="requestCard">

<h3>${request.fullname}</h3>

<div class="infoRow">

<span>Username</span>

<span>${request.username}</span>

</div>

<div class="infoRow">

<span>Email</span>

<span>${request.email}</span>

</div>

<div class="infoRow">

<span>Account Holder</span>

<span>${request.accountHolderName}</span>

</div>

<div class="infoRow">

<span>Amount</span>

<span>₦${Number(request.amount).toLocaleString()}</span>

</div>

<div class="actions">

<button
class="approveBtn"
data-request="${request.id}"
data-user="${request.uid}">

Approve

</button>

<button
class="rejectBtn"
data-request="${request.id}">

Reject

</button>

</div>

</div>

`;

});

}

searchInput.addEventListener("input",()=>{

const keyword=searchInput.value.toLowerCase();

const filtered=requests.filter(item=>

(item.fullname||"").toLowerCase().includes(keyword)||

(item.username||"").toLowerCase().includes(keyword)||

(item.email||"").toLowerCase().includes(keyword)

);

displayRequests(filtered);

});

/* Part 2B starts here */

document.addEventListener("click", async(e)=>{

/* APPROVE */

if(e.target.classList.contains("approveBtn")){

const requestId=e.target.dataset.request;

const userId=e.target.dataset.user;

const ok=confirm("Approve this activation request?");

if(!ok) return;

loader.style.display="flex";

try{

await updateDoc(

doc(db,"users",userId),

{

activated:true

}

);

const userRef=doc(db,"users",userId);

const userSnap=await getDoc(userRef);

const userData=userSnap.data();

if(
userData.referredBy &&
!userData.referralRewardPaid
){

const referrerQuery=query(

collection(db,"users"),

where("username","==",userData.referredBy)

);

const referrerSnap=await getDocs(referrerQuery);

if(!referrerSnap.empty){

const referrerDoc=referrerSnap.docs[0];

await updateDoc(

referrerDoc.ref,

{

balance:increment(referralReward),
referralBonus:increment(referralReward),

totalReferrals:increment(1)

}

);

await addDoc(
collection(db,"history"),
{
uid: referrerDoc.id,
type: "Referral Bonus",
amount: referralReward,
status: "completed",
description: `Referral bonus from ${userData.username}`,
createdAt: serverTimestamp()
}
);

await updateDoc(

userRef,

{

referralRewardPaid:true

}

);

}

}

await updateDoc(

doc(db,"activation_requests",requestId),

{

status:"approved"

}

);

loader.style.display="none";

alert("Activation approved successfully.");

loadRequests();

}catch(error){

loader.style.display="none";

alert(error.message);

}

}

/* REJECT */

if(e.target.classList.contains("rejectBtn")){

const requestId=e.target.dataset.request;

const ok=confirm("Reject this activation request?");

if(!ok) return;

loader.style.display="flex";

try{

await updateDoc(

doc(db,"activation_requests",requestId),

{

status:"rejected"

}

);

loader.style.display="none";

alert("Activation request rejected.");

loadRequests();

}catch(error){

loader.style.display="none";

alert(error.message);

}

}

});

</script>

</body>

</html>
