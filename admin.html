<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Earnix</title>

<title>Earnix Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:#fff;
padding-bottom:100px;
}

header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #181818;
}

header h2{
font-size:25px;
font-weight:700;
}

header p{
font-size:13px;
color:#888;
margin-top:3px;
}

#refreshBtn{
width:45px;
height:45px;
border:none;
border-radius:50%;
background:#00ff88;
color:#000;
font-size:18px;
cursor:pointer;
}

.summary{
margin:20px;
background:#111;
border:1px solid #1f1f1f;
border-radius:20px;
padding:20px;
}

.summary h3{
font-size:18px;
margin-bottom:8px;
}

.summary h1{
font-size:42px;
color:#00ff88;
margin-top:5px;
}

.requests{
padding:0 20px;
}

.request-card{
background:#111;
border:1px solid #222;
border-radius:18px;
padding:20px;
margin-bottom:18px;
}

.request-card h3{
font-size:20px;
margin-bottom:15px;
color:#00ff88;
}

.info{
display:flex;
justify-content:space-between;
margin-bottom:12px;
font-size:14px;
}

.info span:first-child{
color:#888;
}

.actions{
display:flex;
gap:12px;
margin-top:20px;
}

.actions button{
flex:1;
height:48px;
border:none;
border-radius:12px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.approve{
background:#00ff88;
color:#000;
}

.reject{
background:#ff3b30;
color:#fff;
}

.empty{
display:none;
text-align:center;
padding:60px 20px;
color:#888;
}

.empty i{
font-size:70px;
margin-bottom:20px;
color:#333;
}

.empty h3{
margin-bottom:10px;
}

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.92);
backdrop-filter:blur(5px);
z-index:9999;
}

.loaderBox{
background:#111;
padding:30px;
width:280px;
border-radius:18px;
text-align:center;
border:1px solid rgba(0,255,136,.2);
}

.spinner{
width:60px;
height:60px;
margin:auto;
border-radius:50%;
border:5px solid #222;
border-top:5px solid #00ff88;
animation:spin .8s linear infinite;
margin-bottom:20px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.loaderBox h3{
color:#00ff88;
margin-bottom:10px;
}

.loaderBox p{
color:#888;
font-size:14px;
}

.bottomNav{

position:fixed;

bottom:0;

left:0;

width:100%;

height:70px;

background:#111;

border-top:1px solid #222;

display:flex;

justify-content:space-around;

align-items:center;

z-index:999;

}

.bottomNav .navItem{

display:flex;

flex-direction:column;

align-items:center;

text-decoration:none;

color:#888;

font-size:12px;

gap:5px;

flex:1;

}

.bottomNav .navItem i{

font-size:22px;

}

.bottomNav .navItem.active{

color:#00ff88;

font-weight:600;

}

body{

padding-bottom:90px;

}

/* Bottom Navigation */

.bottomNav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:70px;
background:#111;
border-top:1px solid #222;
display:flex;
justify-content:space-around;
align-items:center;
z-index:999;
}

.bottomNav a{
flex:1;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-decoration:none;
color:#888;
font-size:12px;
transition:.3s;
}

.bottomNav a i{
font-size:22px;
margin-bottom:4px;
}

.bottomNav a:hover{
color:#00ff88;
}

.bottomNav a.active{
color:#00ff88;
}

.bottomNav a.active i{
transform:scale(1.1);
}

</style>

</head>

<body>

<header>

<div>

<h2>Earnix Admin</h2>

<p>Manage activation requests</p>

</div>

<button id="refreshBtn">

<i class="fa-solid fa-rotate-right"></i>

</button>

</header>

<div class="summary">

<h3>Pending Requests</h3>

<h1 id="pendingCount">0</h1>

</div>

<div id="requestContainer" class="requests">

<!-- Firebase will load request cards here -->

</div>

<div id="emptyState" class="empty">

<i class="fa-solid fa-inbox"></i>

<h3>No Pending Requests</h3>

<p>New activation requests will appear here.</p>

</div>

<div id="loader">

<div class="loaderBox">

<div class="spinner"></div>

<h3>Loading...</h3>

<p>Please wait.</p>

</div>

</div>

<script type="module">

const navItems=document.querySelectorAll(".navItem");

const pages=document.querySelectorAll(".page");

navItems.forEach(item=>{

item.addEventListener("click",(e)=>{

e.preventDefault();

navItems.forEach(n=>n.classList.remove("active"));

item.classList.add("active");

pages.forEach(page=>{

page.style.display="none";

});

document.getElementById(item.dataset.page).style.display="block";

document.getElementById("pageTitle").textContent=

item.querySelector("span").textContent;

});

});

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

import {
getFirestore,
collection,
query,
where,
getDocs,
doc,
updateDoc,
getDoc,
increment,
documentId
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyChi8M-iJaXsqOOFrwqD25aJJQoCMdaVVU",

authDomain:"earnix-c7507.firebaseapp.com",

projectId:"earnix-c7507",

storageBucket:"earnix-c7507.firebasestorage.app",

messagingSenderId:"930659607352",

appId:"1:930659607352:web:4d1c3bce0cfd39d4e417cd"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getFirestore(app);

const loader=document.getElementById("loader");

const requestContainer=document.getElementById("requestContainer");

const pendingCount=document.getElementById("pendingCount");

const emptyState=document.getElementById("emptyState");

loader.style.display="flex";

onAuthStateChanged(auth,async(user)=>{

if(!user){

window.location.replace("login.html");

return;

}

loadRequests();

});

async function loadRequests(){

loader.style.display="flex";

requestContainer.innerHTML="";

try{

const q=query(

collection(db,"activation_requests"),

where("status","==","pending")

);

const snapshot=await getDocs(q);

pendingCount.textContent=snapshot.size;

if(snapshot.empty){

emptyState.style.display="block";

loader.style.display="none";

return;

}

emptyState.style.display="none";

snapshot.forEach((docSnap)=>{

const data=docSnap.data();

const card=document.createElement("div");

card.className="request-card";

card.innerHTML=`

<h3>${data.fullname}</h3>

<div class="info">

<span>Username</span>

<span>${data.username}</span>

</div>

<div class="info">

<span>Email</span>

<span>${data.email}</span>

</div>

<div class="info">

<span>Account Holder</span>

<span>${data.accountHolderName}</span>

</div>

<div class="info">

<span>Amount</span>

<span>₦500</span>

</div>

<div class="actions">

<button
class="approve"
data-request="${docSnap.id}"
data-user="${data.uid}">

Approve

</button>

<button
class="reject"
data-request="${docSnap.id}">

Reject

</button>

</div>

`;

requestContainer.appendChild(card);

});

loader.style.display="none";

}catch(error){

loader.style.display="none";

alert(error.message);

}

/* Continue in Part 2B */

requestContainer.addEventListener("click",async(e)=>{

const button=e.target;

if(button.classList.contains("approve")){

const requestId=button.dataset.request;

const userId=button.dataset.user;

const ok=confirm("Approve this activation request?");

if(!ok) return;

loader.style.display="flex";

try{

await updateDoc(

doc(db,"users",userId),

{

activated:true

}

);

const userRef=doc(db,"users",userId);

const userSnap=await getDoc(userRef);

const userData=userSnap.data();

if(
userData.referredBy &&
!userData.referralRewardPaid
){

const referrerQuery=query(

collection(db,"users"),

where("username","==",userData.referredBy)

);

const referrerSnap=await getDocs(referrerQuery);

if(!referrerSnap.empty){

const referrerDoc=referrerSnap.docs[0];

await updateDoc(

referrerDoc.ref,

{

balance:increment(400),

referralBonus:increment(400),

totalReferrals:increment(1)

}

);

await updateDoc(

userRef,

{

referralRewardPaid:true

}

);

}

}

await updateDoc(

doc(db,"activation_requests",requestId),

{

status:"approved"

}

);

await loadRequests();

loader.style.display="none";

alert("User activated successfully.");

}catch(error){

loader.style.display="none";

alert(error.message);

}

}

if(button.classList.contains("reject")){

const requestId=button.dataset.request;

const ok=confirm("Reject this activation request?");

if(!ok) return;

loader.style.display="flex";

try{

await updateDoc(

doc(db,"activation_requests",requestId),

{

status:"rejected"

}

);

await loadRequests();

loader.style.display="none";

alert("Activation request rejected.");

}catch(error){

loader.style.display="none";

alert(error.message);

}

}

});

document.getElementById("refreshBtn").addEventListener("click",()=>{

loadRequests();

});

}

</script>

<!-- Bottom Navigation -->

<nav class="bottomNav">

<a href="admin.html">
<i class="fa-solid fa-house"></i>
<span>Home</span>
</a>

<a href="admin-users.html">
<i class="fa-solid fa-users"></i>
<span>Users</span>
</a>

<a href="admin-activate.html" class="active">
<i class="fa-solid fa-circle-check"></i>
<span>Activate</span>
</a>

<a href="admin-withdrawals.html">
<i class="fa-solid fa-money-bill-wave"></i>
<span>Withdraw</span>
</a>

<a href="admin-settings.html">
<i class="fa-solid fa-gear"></i>
<span>Settings</span>
</a>

</nav>

</body>

</html>
