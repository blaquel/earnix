<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Earnix</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:#fff;
overflow-x:hidden;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
}

.logo{
font-size:26px;
font-weight:700;
color:#00ff88;
}

nav a{
color:#fff;
text-decoration:none;
margin-left:20px;
font-size:15px;
}

.hero{
min-height:85vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.box{
max-width:500px;
}

h1{
font-size:42px;
line-height:1.2;
margin-bottom:15px;
}

h1 span{
color:#00ff88;
}

p{
color:#bdbdbd;
font-size:16px;
margin-bottom:35px;
}

.btns{
display:flex;
justify-content:center;
gap:15px;
}

.btn{
padding:14px 28px;
border-radius:50px;
text-decoration:none;
font-weight:600;
transition:.3s;
}

.primary{
background:#00ff88;
color:#000;
}

.primary:hover{
transform:translateY(-3px);
box-shadow:0 0 20px #00ff88;
}

.secondary{
border:2px solid #00ff88;
color:#00ff88;
}

.secondary:hover{
background:#00ff88;
color:#000;
}

.glow{
position:absolute;
width:300px;
height:300px;
background:#00ff88;
filter:blur(180px);
opacity:.2;
top:-80px;
left:-100px;
z-index:-1;
}

.glow2{
position:absolute;
width:250px;
height:250px;
background:gold;
filter:blur(180px);
opacity:.15;
right:-80px;
bottom:-50px;
z-index:-1;
}

footer{
text-align:center;
padding:20px;
color:#777;
font-size:14px;
}

.getStartedBtn,
.registerBtn{
display:inline-flex;
justify-content:center;
align-items:center;
width:100%;
height:55px;
background:#00ff88;
color:#000;
font-size:16px;
font-weight:700;
text-decoration:none;
border:none;
border-radius:14px;
cursor:pointer;
transition:.3s;
}

.getStartedBtn:hover,
.registerBtn:hover{
opacity:.9;
transform:translateY(-2px);
}

.getStartedBtn:active,
.registerBtn:active{
transform:scale(.98);
}
</style>

</head>
<body>

<div class="glow"></div>
<div class="glow2"></div>

<header>

<div class="logo">Earnix</div>

<nav>
<a href="login.html">Login</a>
<a href="register.html">Sign Up</a>
</nav>

</header>

<section class="hero">

<div class="box">

<h1>Refer.<br><span>Earn.</span> Repeat.</h1>

<p>Invite friends, activate your account, and earn rewards from every successful referral.</p>

<div class="btns">

<a href="register.html" class="getStartedBtn">Get Started</a>

<a href="login.html" class="btn secondary">
Login
</a>

</div>

</div>

</section>

<footer>
© 2026 Earnix. All Rights Reserved.
</footer>

</body>
</html>
