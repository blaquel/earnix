<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Earnix</title>

<title>Login | Earnix</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
color:#fff;
}

.container{
width:100%;
max-width:400px;
background:#111;
border:1px solid rgba(0,255,136,.15);
border-radius:18px;
padding:30px 25px;
box-shadow:0 0 25px rgba(0,255,136,.08);
}

.logo{
text-align:center;
font-size:30px;
font-weight:700;
color:#00ff88;
margin-bottom:10px;
}

h2{
text-align:center;
margin-bottom:5px;
font-size:26px;
}

p{
text-align:center;
color:#999;
font-size:14px;
margin-bottom:25px;
}

.input-box{
margin-bottom:18px;
position:relative;
}

.input-box input{
width:100%;
padding:15px;
border:none;
outline:none;
background:#1a1a1a;
color:#fff;
border-radius:12px;
font-size:15px;
}

.input-box input:focus{
border:1px solid #00ff88;
}

.toggle{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
font-size:13px;
font-weight:600;
color:#00ff88;
cursor:pointer;
user-select:none;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#00ff88;
color:#000;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

button:hover{
box-shadow:0 0 15px #00ff88;
}

.bottom{
margin-top:20px;
text-align:center;
font-size:14px;
color:#999;
}

.bottom a{
color:#00ff88;
text-decoration:none;
font-weight:600;
}

/* Loader */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.92);
backdrop-filter:blur(4px);
z-index:999;
}

.loader-box{
background:#111;
padding:35px;
border-radius:18px;
text-align:center;
width:280px;
border:1px solid rgba(0,255,136,.15);
}

.spinner{
width:55px;
height:55px;
margin:auto;
border:4px solid #222;
border-top:4px solid #00ff88;
border-radius:50%;
animation:spin .8s linear infinite;
margin-bottom:20px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.loader-box h3{
margin-bottom:10px;
}

.loader-box p{
margin:0;
font-size:14px;
color:#999;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
Earnix
</div>

<h2>Welcome Back</h2>

<p>Login to continue</p>

<form id="loginForm">

<div class="input-box">
<input
type="email"
id="email"
placeholder="Email Address"
required>
</div>

<div class="input-box">

<input
type="password"
id="password"
placeholder="Password"
required>

<span
class="toggle"
id="togglePassword">
Show
</span>

</div>

<button type="submit">
Login
</button>

</form>

<div class="bottom">

Don't have an account?

<a href="register.html">
Create Account
</a>

</div>

</div>

<div id="loader">

<div class="loader-box">

<div class="spinner"></div>

<h3>Signing In...</h3>

<p>Please wait.</p>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyChi8M-iJaXsqOOFrwqD25aJJQoCMdaVVU",
authDomain: "earnix-c7507.firebaseapp.com",
projectId: "earnix-c7507",
storageBucket: "earnix-c7507.firebasestorage.app",
messagingSenderId: "930659607352",
appId: "1:930659607352:web:4d1c3bce0cfd39d4e417cd"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Show / Hide Password

const password = document.getElementById("password");
const toggle = document.getElementById("togglePassword");

toggle.addEventListener("click",()=>{

if(password.type==="password"){

password.type="text";
toggle.textContent="Hide";

}else{

password.type="password";
toggle.textContent="Show";

}

});

// Login

const form=document.getElementById("loginForm");

form.addEventListener("submit",async(e)=>{

e.preventDefault();

const loader=document.getElementById("loader");

loader.style.display="flex";

const email=document.getElementById("email").value.trim();

const pass=document.getElementById("password").value;

try{

await signInWithEmailAndPassword(auth,email,pass);

window.location.replace("dashboard.html");

}catch(error){

loader.style.display="none";

let message="Login failed.";

switch(error.code){

case "auth/invalid-credential":
message="Incorrect email or password.";
break;

case "auth/invalid-email":
message="Please enter a valid email.";
break;

case "auth/user-disabled":
message="This account has been disabled.";
break;

case "auth/network-request-failed":
message="No internet connection.";
break;

}

alert(message);

}

});

</script>

</body>
</html>
