<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Earnix</title>
<title>Create Account | Earnix</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
color:#fff;
overflow:hidden;
}

.container{
width:100%;
max-width:420px;
background:#111;
border:1px solid rgba(0,255,136,.15);
border-radius:20px;
padding:30px 25px;
box-shadow:0 0 30px rgba(0,255,136,.08);
}

.logo{
text-align:center;
font-size:30px;
font-weight:700;
color:#00ff88;
margin-bottom:10px;
}

.title{
text-align:center;
font-size:24px;
font-weight:600;
margin-bottom:5px;
}

.subtitle{
text-align:center;
font-size:14px;
color:#888;
margin-bottom:25px;
}

.input-box{
margin-bottom:18px;
}

.input-box input{
width:100%;
padding:15px;
background:#1b1b1b;
border:1px solid #222;
border-radius:12px;
outline:none;
font-size:15px;
color:#fff;
transition:.3s;
}

.input-box input:focus{
border-color:#00ff88;
}

.password-box{
position:relative;
}

.password-box input{
padding-right:70px;
}

.toggle{
position:absolute;
top:50%;
right:15px;
transform:translateY(-50%);
font-size:13px;
font-weight:600;
color:#00ff88;
cursor:pointer;
user-select:none;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#00ff88;
color:#000;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

button:hover{
box-shadow:0 0 20px #00ff88;
}

.bottom{
margin-top:20px;
text-align:center;
font-size:14px;
color:#999;
}

.bottom a{
color:#00ff88;
text-decoration:none;
font-weight:600;
}

/* Loading Overlay */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
z-index:999;
backdrop-filter:blur(5px);
}

.loader-box{
background:#111;
padding:35px;
border-radius:20px;
text-align:center;
width:280px;
border:1px solid rgba(0,255,136,.2);
}

.spinner{
width:55px;
height:55px;
margin:auto;
border:4px solid #222;
border-top:4px solid #00ff88;
border-radius:50%;
animation:spin .8s linear infinite;
margin-bottom:20px;
}

.loader-box h3{
margin-bottom:8px;
}

.loader-box p{
color:#999;
font-size:14px;
}

@keyframes spin{

100%{
transform:rotate(360deg);
}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
Earnix
</div>

<div class="title">
Create Account
</div>

<div class="subtitle">
Start earning through referrals.
</div>

<form id="registerForm">

<div class="input-box">
<input type="text" id="fullname" placeholder="Full Name" required>
</div>

<div class="input-box">
<input type="text" id="username" placeholder="Username" required>
</div>

<div class="input-box">
<input type="email" id="email" placeholder="Email Address" required>
</div>

<div class="input-box">
<input type="text" id="referralCode" placeholder="Referral Code (Optional)">
</div>

<div class="input-box password-box">
<input type="password" id="password" placeholder="Password" required>
<span class="toggle" onclick="togglePassword('password',this)">Show</span>
</div>

<div class="input-box password-box">
<input type="password" id="confirmPassword" placeholder="Confirm Password" required>
<span class="toggle" onclick="togglePassword('confirmPassword',this)">Show</span>
</div>

<button type="submit">
Create Account
</button>

</form>

<div class="bottom">
Already have an account?
<a href="login.html">Login</a>
</div>

</div>

<!-- Loading Overlay -->

<div id="loader">

<div class="loader-box">

<div class="spinner"></div>

<h3>Creating Account...</h3>

<p>Please wait while we set up your Earnix account.</p>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
collection,
query,
where,
getDocs,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyChi8M-iJaXsqOOFrwqD25aJJQoCMdaVVU",
authDomain: "earnix-c7507.firebaseapp.com",
projectId: "earnix-c7507",
storageBucket: "earnix-c7507.firebasestorage.app",
messagingSenderId: "930659607352",
appId: "1:930659607352:web:4d1c3bce0cfd39d4e417cd"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

window.togglePassword = function(id,btn){

const input=document.getElementById(id);

if(input.type==="password"){
input.type="text";
btn.innerHTML="Hide";
}else{
input.type="password";
btn.innerHTML="Show";
}

}

/* Auto-fill referral code from URL */

const params=new URLSearchParams(window.location.search);

const ref=params.get("ref");

if(ref){

document.getElementById("referralCode").value=ref;

}

const form=document.getElementById("registerForm");

form.addEventListener("submit",async(e)=>{

e.preventDefault();

const loader=document.getElementById("loader");

loader.style.display="flex";

const fullname=document.getElementById("fullname").value.trim();

const username=document.getElementById("username").value.trim().toLowerCase();

const email=document.getElementById("email").value.trim();

const referralCode=document.getElementById("referralCode").value.trim();

const password=document.getElementById("password").value;

const confirmPassword=document.getElementById("confirmPassword").value;

if(password!==confirmPassword){

loader.style.display="none";

alert("Passwords do not match.");

return;

}

try{

const check=query(
collection(db,"users"),
where("username","==",username)
);

const exists=await getDocs(check);

if(!exists.empty){

loader.style.display="none";

alert("Username already exists.");

return;

}

const result=await createUserWithEmailAndPassword(
auth,
email,
password
);

const uid=result.user.uid;

await setDoc(doc(db,"users",uid),{

fullname:fullname,

username:username,

email:email,

balance:0,

referredBy:document.getElementById("referralCode").value.trim().toLowerCase(),

referralBonus:0,

totalReferrals:0,

referralRewardPaid:false,

createdAt:serverTimestamp()

});

loader.style.display="none";

alert("Account created successfully.");

window.location.href="login.html";

}catch(error){

loader.style.display="none";

alert(error.message);

}

});

/* Force username to lowercase while typing */

const usernameInput=document.getElementById("username");

usernameInput.addEventListener("input",()=>{

usernameInput.value=usernameInput.value.toLowerCase();

});

</script>

</body>
</html>
